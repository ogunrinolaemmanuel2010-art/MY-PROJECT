<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Css/help-centre.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/svg+xml" href="../Multimedia/images/title icon.png">
    <title>Help-centre submit a request...</title>
</head>

<body>

    <!-- header -->

    <header>
        <div class="head-left">
            <h3><img src="https://help.behance.net/hc/theming_assets/01HZPM0AE7VNNJNPE29EFV9RC2" alt="">Help Centre</h3>
        </div>

        <div class="head-right">
            <button>Zendsk Login</button>
            <button>Contact us</button>
            <button class="back-bttn">Back to Behance</button>
            <img src="../Multimedia/images/adobe.svg" alt="">
        </div>
    </header>


    <!-- hero section -->

    <section class="hero">
        <h1>Behance Help Center</h1>
        <p>Everything you need to get started on Behance</p>
    </section>


    <!-- search -->
    <section class="help-centre">
        <div class="behance">
            <h4>Behance Helpcenter</h4>
            <h4>></h4>
            <h5>Submit a request</h5>
        </div>

        <div class="search-bar">
            <i class="bi-search"></i>
            <input type="text" placeholder="Search">
        </div>
    </section>

    <form>
        <div class="form-con">
            <h2>Submit a request</h2>

            <div class="label">
                <label for="#">email address<span>(required)</span></label>
                <input type="text" placeholder="">
            </div>

            <div class="label">
                <label for="#">Subject<span>(required)</span></label>
                <input type="text" placeholder="">
            </div>

            <div class="label">
                <label for="">What best describes the reason you're contacting us today?<span>(required)</span></label>
                <div class="select-wrap">
                    <select name="" id="">
                        <option value="">-</option>
                        <option value="">Log-in or Acess Issues</option>
                        <option value="">Behance Pro Memberships</option>
                        <option value="">Project Publishing</option>
                        <option value="">I have feedback or suggestions for Behance</option>
                        <option value="">I have a question about Stripe, Paypal, or payments on Behance</option>
                        <option value="">I have a question about Job Posts, Freelance Briefs, or Hiring</option>
                        <option value="">Behance Mobile Apps</option>
                        <option value="">Messaging, Comments & Appreciations Issues</option>
                        <option value="">My Project/Profile has been marked as Mature/Spam</option>
                        <option value="">Something Else</option>
                    </select>
                    <i class="bi bi-caret-down-fill" aria-hidden="true"></i>
                </div>
            </div>

            <div class="label">
                <label for="">Description<span>(required)</span></label>
                <textarea name="" id=""></textarea>
                <p>Please enter the details of your request. A member of our support staff will respond as soon as
                    possible.
                </p>
            </div>

            <div class="label">
                <label for="">Behance username</label>
                <input type="text" placeholder="">
                <p>Behance.net/__________</p>
            </div>

            <div class="label">
                <label for="">Attachment</label>
                <input type="text">
            </div>

            <div class="file">
                <input type="file" name="" placeholder="span Add file span or drop files here">
            </div>

            <div class="label">
                <button>Submit</button>
            </div>
        </div>
    </form>

    <!-- footer -->
    <footer>
        <div class="footer-left">
            <div class="footer-locale">
                <i class="bi bi-globe2" aria-hidden="true"></i>
                <div class="footer-select-wrap">
                    <select name="language" id="language">
                        <option value="en-us">English</option>
                        <option value="cs">Cestina</option>
                        <option value="de">Deutsch</option>
                        <option value="es">Espanol</option>
                        <option value="fr">Francais</option>
                        <option value="it">Italiano</option>
                        <option value="nl">Nederlands</option>
                        <option value="pl">Polski</option>
                        <option value="pt-br">Portugues (Brasil)</option>
                        <option value="sv">Svenska</option>
                        <option value="tr">Turkce</option>
                    </select>
                </div>
            </div>

            <h5>TOU</h5>
            <h5>Privacy</h5>
            <h5>Community</h5>
        </div>

        <div class="footer-right">
            <img src="../Multimedia/images/adobe.svg" alt="">
        </div>
    </footer>
</body>

</html>
